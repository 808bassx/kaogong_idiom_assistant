name: kaogong_idiom_assistant
description: 考公成语随身助教 - 本地 AI 学习软件
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Material Design 3
  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.2

  # HTTP 网络请求
  http: ^1.2.1

  # 本地存储
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  path_provider: ^2.1.3

  # Markdown 渲染
  flutter_markdown: ^0.7.1
  markdown: ^7.2.2

  # 代码高亮
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # 图表
  fl_chart: ^0.68.0

  # 文件操作
  file_picker: ^8.0.3
  share_plus: ^9.0.0
  path: ^1.9.0

  # 日期选择
  intl: ^0.20.2

  # 动画
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # 滚动
  infinite_scroll_pagination: ^4.0.0

  # Toast 提示
  fluttertoast: ^8.2.4

  # 复制到剪贴板
  # flutter自带 Clipboard

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
